<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1220" />
  <title>Study Density Log</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css?v=20260512a" />
</head>
<body>
  <header class="app-header">
    <h1 id="appTitle">Study Density Log</h1>
    <div id="authArea" class="auth-area">
      <button id="loginBtn" class="btn primary">Googleログイン</button>
    </div>
  </header>

  <main id="app" class="app" hidden>
    <section id="dashboard" class="screen active"></section>
    <section id="record" class="screen"></section>
    <section id="list" class="screen"></section>
    <section id="goals" class="screen"></section>
    <section id="settings" class="screen"></section>
  </main>

  <nav class="bottom-nav" id="bottomNav" hidden>
    <button data-screen="list">一覧</button>
    <button data-screen="record">追加</button>
    <button data-screen="dashboard">ホーム</button>
    <button data-screen="goals">目標</button>
    <button data-screen="settings">設定</button>
  </nav>

  <script type="module" src="app.js?v=20260512b"></script>
</body>
</html>
